name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install -E dev --no-interaction

      - name: Run pre-commit (required)
        run: poetry run pre-commit run --all-files --show-diff-on-failure

  test-build:
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install -E dev --no-interaction

      - name: Run tests with coverage (Ubuntu 3.12)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: poetry run pytest --cov=buscar --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Run tests
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.12'
        run: poetry run pytest

      - name: Build package
        run: poetry build

      - name: Validate wheel import
        shell: bash
        run: |
          poetry run python -m pip install --upgrade pip
          poetry run python -m pip install dist/*.whl
          poetry run python -c "import buscar; print(buscar.__name__)"
