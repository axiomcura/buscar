[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "buscar"
version = "0.1.0"
description = "A Python framework for prioritizing compounds in high-content imaging drug screening using single-cell profiles."
authors = ["Erik Serrano <erikishere3@gmail.com>"]
readme = "README.md"
license = "MIT"
packages = [
  {include = "buscar"},
  {include = "utils"}
]
keywords = ["single-cell", "drug-screening", "image-profiling", "phenotypic-screening"]

[tool.poetry.dependencies]
python = ">=3.10,<3.14"
beartype = "^0.21.0"
numpy = ">=2.2.5,<3.0.0"
polars = ">=1.29.0,<2.0.0"
pot = "^0.9.5"
scikit-learn = ">=1.6.1,<2.0.0"
scipy = ">=1.15.3,<2.0.0"
statsmodels = ">=0.14.4,<0.15.0"
umap-learn = "^0.5.9.post2"

[tool.poetry.group.dev.dependencies]
pre-commit = "^4.2.0"
pandas = ">=2.2.0,<3.0.0"
pytest = "^8.4.1"

[tool.poetry.group.notebooks]
optional = true

[tool.poetry.group.notebooks.dependencies]
igraph = "^0.11.9"
ipykernel = "^6.29.5"
jupyter = "^1.1.1"
leidenalg = "^0.10.2"
louvain = "^0.8.2"
matplotlib = ">=3.10.3,<4.0.0"
narwhals = "^2.4.0"
optuna = "^4.5.0"
pycytominer = ">=1.2.3,<2.0.0"
scanpy = "^1.11.4"
tqdm = "^4.67.1"

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"
